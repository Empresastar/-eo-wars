<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MineClone - Fix Import</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none; border: 1px solid black;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>

    <script type="module">
        // Importando diretamente da URL para o navegador não se perder
        import * as THREE from 'https://unpkg.com/three@0.149.0/build/three.module.js';
        import { PointerLockControls } from 'https://unpkg.com/three@0.149.0/examples/jsm/controls/PointerLockControls.js';

        let scene, camera, renderer, controls;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            try {
                renderer = new THREE.WebGLRenderer({ 
                    antialias: false, 
                    precision: "mediump" 
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);
            } catch (e) {
                alert("Erro ao iniciar WebGL. Tente usar o navegador Firefox ou atualize seus drivers.");
                return;
            }

            // Luz e Chão simples
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshBasicMaterial({ color: 0x48a044 });

            for (let x = -5; x < 5; x++) {
                for (let z = -5; z < 5; z++) {
                    const cube = new THREE.Mesh(geo, mat);
                    cube.position.set(x, 0, z);
                    scene.add(cube);
                }
            }

            controls = new PointerLockControls(camera, document.body);
            document.addEventListener('click', () => controls.lock());

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(renderer) renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
